worker_processes 1;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    keepalive_timeout 300;

    map $http_x_api_key $api_key_match {
        default 0;
        "${API_KEY}" 1;
    }

    server {
        listen 80;

        # Health check — proxies to TGI health endpoint
        location /health {
            proxy_pass http://127.0.0.1:8080/health;
            proxy_set_header Host $host;
        }

        # Inference endpoints
        location /generate {
            # API key validation
            if ($http_x_api_key = "") {
                return 401 '{"error": "Missing API key. Include x-api-key header."}';
            }
            if ($api_key_match = 0) {
                return 401 '{"error": "Invalid API key."}';
            }

            # Proxy to TGI
            proxy_pass http://127.0.0.1:8080/generate;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Connection '';
            proxy_http_version 1.1;

            # Critical for SSE streaming
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 300s;
        }

        location /generate_stream {
            # API key validation
            if ($http_x_api_key = "") {
                return 401 '{"error": "Missing API key. Include x-api-key header."}';
            }
            if ($api_key_match = 0) {
                return 401 '{"error": "Invalid API key."}';
            }

            # Proxy to TGI
            proxy_pass http://127.0.0.1:8080/generate_stream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Connection '';
            proxy_http_version 1.1;

            # Critical for SSE streaming
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 300s;
        }

        # Block everything else
        location / {
            return 404 '{"error": "Not found"}';
        }
    }
}
